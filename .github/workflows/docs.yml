name: Documentation

# This workflow only validates that make.jl parses correctly.
# Actual deployment is done locally via `julia docs/deploy.jl`
# because LatticeGPU and BDIO live on a private server (igit.ific.uv.es)
# that GitHub Actions runners cannot reach.

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  syntax-check:
    name: Check docs syntax
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: julia-actions/setup-julia@v2
        with:
          version: '1'
      - name: Check make.jl parses
        run: julia --project=docs -e '
          using Pkg; Pkg.instantiate()
          include("docs/make.jl")
          ' || echo "Note: full build requires LatticeGPU/BDIO from private registry"
